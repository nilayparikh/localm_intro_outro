<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Redirecting...</title>
  <script>
    // SPA redirect for GitHub Pages — stores the path and redirects to index.html
    sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
    location.replace('/');
  </script>
</head>

<body>
</body>

</html>
