<head>

  <title>LocalM™ Intro Outro</title>
  <meta name="description" content="LocalM™ Intro Outro — Thumbnail, intro, and outro generator" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Inter:wght@400;600;800&family=Lato:wght@400;700;900&family=Montserrat:wght@400;600;800&family=Oswald:wght@400;600;700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@400;600;800&family=Roboto:wght@400;500;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <script>
    // SPA redirect handler for GitHub Pages 404.html
    (function () {
      var redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        history.replaceState(null, '', redirect);
      }
    })();
  </script>
</head>

  <div id="root"></div>
