<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" width="100%" height="100%">
  <defs>
    <!-- Background Dark Gradient -->
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>

    <!-- Glowing Stroke Gradients -->
    <linearGradient id="stroke-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" /><stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="stroke-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" /><stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="stroke-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" /><stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="stroke-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" /><stop offset="100%" stop-color="#ef4444" />
    </linearGradient>

    <!-- Vibrant Gradient Fills (to replace the plain glass) -->
    <linearGradient id="fill-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(59, 130, 246, 0.35)" /><stop offset="100%" stop-color="rgba(139, 92, 246, 0.35)" />
    </linearGradient>
    <linearGradient id="fill-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(236, 72, 153, 0.35)" /><stop offset="100%" stop-color="rgba(244, 63, 94, 0.35)" />
    </linearGradient>
    <linearGradient id="fill-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(16, 185, 129, 0.35)" /><stop offset="100%" stop-color="rgba(6, 182, 212, 0.35)" />
    </linearGradient>
    <linearGradient id="fill-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(245, 158, 11, 0.35)" /><stop offset="100%" stop-color="rgba(239, 68, 68, 0.35)" />
    </linearGradient>

    <!-- ROW 1: TEXT PATHS (Left to Right reading) -->
    <path id="t1-top" d="M 140 250 Q 225 250 250 350" fill="none" />
    <path id="t2-top" d="M 320 250 L 510 250" fill="none" />
    <path id="t3-top" d="M 640 250 L 870 250" fill="none" />
    <path id="t4-top" d="M 1060 350 Q 1077 250 1150 250" fill="none" />

    <!-- ROW 2: TEXT PATHS (Mapped L->R to stay strictly upright and perfectly bounded) -->
    <path id="t1-bot" d="M 80 450 Q 105 550 180 550" fill="none" />
    <path id="t2-bot" d="M 360 550 L 550 550" fill="none" />
    <path id="t3-bot" d="M 680 550 L 910 550" fill="none" />
    <path id="t4-bot" d="M 1130 550 Q 1203 550 1220 450" fill="none" />

    <!-- Glass Glow Filter -->
    <filter id="glass-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-dark)" />

  <!-- Ambient glowing orbs behind the shapes -->
  <circle cx="150" cy="250" r="100" fill="#3b82f6" opacity="0.15" filter="blur(80px)" />
  <circle cx="450" cy="250" r="100" fill="#ec4899" opacity="0.15" filter="blur(80px)" />
  <circle cx="750" cy="250" r="100" fill="#10b981" opacity="0.15" filter="blur(80px)" />
  <circle cx="1150" cy="250" r="100" fill="#ef4444" opacity="0.15" filter="blur(80px)" />

  <circle cx="150" cy="550" r="100" fill="#3b82f6" opacity="0.15" filter="blur(80px)" />
  <circle cx="450" cy="550" r="100" fill="#ec4899" opacity="0.15" filter="blur(80px)" />
  <circle cx="750" cy="550" r="100" fill="#10b981" opacity="0.15" filter="blur(80px)" />
  <circle cx="1150" cy="550" r="100" fill="#ef4444" opacity="0.15" filter="blur(80px)" />


  <!-- ========================================== -->
  <!-- ROW 1: STANDARD ORIENTATION                -->
  <!-- ========================================== -->

  <!-- 1. Left Curved Arrow -->
  <path d="M 140 225 L 140 190 L 50 250 L 140 310 L 140 275 Q 200 275 225 350 L 275 350 Q 250 225 140 225 Z" 
        fill="url(#fill-1)" stroke="url(#stroke-1)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t1-top" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="110" lengthAdjust="spacingAndGlyphs">FULL VIDEO</textPath>
  </text>

  <!-- 2. Straight Arrow 1 (Subscribe) -->
  <path d="M 310 225 L 520 225 L 520 190 L 600 250 L 520 310 L 520 275 L 310 275 Z" 
        fill="url(#fill-2)" stroke="url(#stroke-2)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t2-top" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="170" lengthAdjust="spacingAndGlyphs">SUBSCRIBE</textPath>
  </text>

  <!-- 3. Straight Arrow 2 (Next Bite-Size) -->
  <path d="M 630 225 L 880 225 L 880 190 L 960 250 L 880 310 L 880 275 L 630 275 Z" 
        fill="url(#fill-3)" stroke="url(#stroke-3)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t3-top" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="210" lengthAdjust="spacingAndGlyphs">NEXT BITE-SIZE</textPath>
  </text>

  <!-- 4. Right Curved Arrow (Course) -->
  <path d="M 1030 350 Q 1055 225 1160 225 L 1160 190 L 1250 250 L 1160 310 L 1160 275 Q 1100 275 1090 350 Z" 
        fill="url(#fill-4)" stroke="url(#stroke-4)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t4-top" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="110" lengthAdjust="spacingAndGlyphs">COURSE</textPath>
  </text>


  <!-- ========================================== -->
  <!-- ROW 2: TRUE 180° ROTATION & UPRIGHT TEXT   -->
  <!-- ========================================== -->

  <!-- 1. Left Curved Arrow (180° Rotated -> Points Right, tail curves up) -->
  <path d="M 190 575 L 190 610 L 280 550 L 190 490 L 190 525 Q 130 525 105 450 L 55 450 Q 80 575 190 575 Z" 
        fill="url(#fill-1)" stroke="url(#stroke-1)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t1-bot" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="110" lengthAdjust="spacingAndGlyphs">FULL VIDEO</textPath>
  </text>

  <!-- 2. Straight Arrow 1 (180° Rotated -> Points Left) -->
  <path d="M 560 575 L 350 575 L 350 610 L 270 550 L 350 490 L 350 525 L 560 525 Z" 
        fill="url(#fill-2)" stroke="url(#stroke-2)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t2-bot" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="170" lengthAdjust="spacingAndGlyphs">SUBSCRIBE</textPath>
  </text>

  <!-- 3. Straight Arrow 2 (180° Rotated -> Points Left) -->
  <path d="M 920 575 L 670 575 L 670 610 L 590 550 L 670 490 L 670 525 L 920 525 Z" 
        fill="url(#fill-3)" stroke="url(#stroke-3)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t3-bot" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="210" lengthAdjust="spacingAndGlyphs">NEXT BITE-SIZE</textPath>
  </text>

  <!-- 4. Right Curved Arrow (180° Rotated -> Points Left, tail curves up) -->
  <path d="M 1250 450 Q 1225 575 1120 575 L 1120 610 L 1030 550 L 1120 490 L 1120 525 Q 1180 525 1190 450 Z" 
        fill="url(#fill-4)" stroke="url(#stroke-4)" stroke-width="2" filter="url(#glass-glow)" />
  <text font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="200" fill="#ffffff" letter-spacing="2">
    <textPath href="#t4-bot" startOffset="50%" text-anchor="middle" dominant-baseline="central" textLength="110" lengthAdjust="spacingAndGlyphs">COURSE</textPath>
  </text>

</svg>