<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <filter id="terminal-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Terminal Body -->
  <rect x="50" y="50" width="700" height="300" rx="12" fill="#1E1E1E" filter="url(#terminal-shadow)"/>
  
  <!-- Terminal Header -->
  <rect x="50" y="50" width="700" height="40" rx="12" fill="#2D2D2D"/>
  <rect x="50" y="70" width="700" height="20" fill="#2D2D2D"/> <!-- hides bottom rounded corners of header -->

  <!-- Mac Buttons -->
  <circle cx="80" cy="70" r="6" fill="#FF5F56" />
  <circle cx="100" cy="70" r="6" fill="#FFBD2E" />
  <circle cx="120" cy="70" r="6" fill="#27C93F" />

  <!-- Terminal Title -->
  <text x="400" y="75" font-family="'Courier New', Courier, monospace" font-size="14" fill="#888888" text-anchor="middle">agentic-pipeline.sh</text>

  <!-- Code / Text -->
  <text x="80" y="140" font-family="'Courier New', Courier, monospace" font-size="20" fill="#D4D4D4">
    <tspan x="80" dy="0" fill="#569CD6">$</tspan>
    <tspan dx="10" fill="#CE9178">echo "What if your data pipeline fixed itself"</tspan>
    
    <tspan x="80" dy="35" fill="#569CD6">$</tspan>
    <tspan dx="10" fill="#CE9178">echo "before you even got the alert?"</tspan>
    
    <tspan x="80" dy="60" fill="#569CD6">$</tspan>
    <tspan dx="10" fill="#4AF626">./initiate_agent.sh</tspan>

    <tspan x="80" dy="50" font-weight="bold" fill="#ffffff">Welcome to the era of</tspan>
    <tspan x="80" dy="30" font-weight="bold" fill="#4AF626">Agentic Data Engineering.</tspan>
    <tspan dx="5" fill="#ffffff">█</tspan> <!-- Blinking cursor effect -->
  </text>
</svg>